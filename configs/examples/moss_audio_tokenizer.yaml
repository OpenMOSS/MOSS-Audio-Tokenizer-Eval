# Example for the three official MOSS-Audio-Tokenizer family models.
# Replace the dataset JSONL path with your own data.
exp_root: exp
device: cuda

datasets:
  - name: my_eval_set
    jsonl: /path/to/eval.jsonl

models:
  - name: MOSS-Audio-Tokenizer
    adapter: moss-audio-tokenizer
    repo_id: OpenMOSS-Team/MOSS-Audio-Tokenizer
    nq: all

  - name: MOSS-Audio-Tokenizer-v2
    adapter: moss-audio-tokenizer-v2
    repo_id: OpenMOSS-Team/MOSS-Audio-Tokenizer-v2
    nq: all

  - name: MOSS-Audio-Tokenizer-Nano
    adapter: moss-audio-tokenizer-nano
    repo_id: OpenMOSS-Team/MOSS-Audio-Tokenizer-Nano
    nq: all

metrics:
  enabled: [stoi, pesq_nb, pesq_wb, mel_loss, spectral_convergence, sdr, sisdr]
  # To enable speaker similarity:
  #   1. Download wavlm_large_finetune.pth from:
  #      https://drive.google.com/file/d/1-aE1NfzpRCLxA4GUxX9ITI3F9LlbtEGP/view
  #   2. Add `sim` to `enabled` and set:
  # options:
  #   sim:
  #     model_path: pretrained_models/sim/wavlm_large_finetune.pth
  #     target_sr: 16000
